        <div id="view-dm" class="view dm-view-shell">
            <div class="chat-box-centered">
                <div class="dm-topbar">
                    <!-- Botão voltar -->
                    <button class="dm-back-btn" onclick="goView('inbox', document.querySelectorAll('.nav-btn')[1])">
                        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                    </button>

                    <!-- Avatar + status -->
                    <div class="dm-topbar-av-wrap" id="dm-header-avatar-wrap">
                        <img id="dm-header-avatar" class="dm-topbar-avatar" src="/static/default-avatar.svg" onerror="this.src='/static/default-avatar.svg'">
                        <span class="status-dot dm-topbar-status" id="dm-header-status-dot"></span>
                    </div>

                    <!-- Nome + subtítulo -->
                    <div class="dm-topbar-info">
                        <div class="dm-topbar-name-row">
                            <div class="dm-topbar-name" id="dm-header-name">Chat</div>
                            <button class="group-settings-btn" id="group-settings-btn" onclick="openGroupSettings()" title="Configurações do grupo" style="display:none" aria-label="Configurações do grupo">⚙️</button>
                        </div>
                        <div class="dm-topbar-sub" id="dm-header-sub">Mensagem Direta</div>
                    </div>

                    <!-- Espaço flexível -->
                    <div style="flex:1"></div>

                    <!-- Botão CALL premium -->
                    <button class="dm-call-btn" id="dm-call-btn" onclick="initCall(currentChatType, currentChatId)">
                        <span class="dm-call-btn-dot"></span>
                        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.61 3.41 2 2 0 0 1 3.6 1.21h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L7.91 8.81a16 16 0 0 0 6.29 6.29l.96-.96a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>
                        <span class="dm-call-btn-label">CALL</span>
                    </button>
                </div>
                <div id="dm-list"></div>
                <form id="dm-input-area" class="chat-input-area" onsubmit="sendDM(); return false;">
                    <input type="file" id="dm-file" class="hidden" onchange="uploadDMImage()" accept="image/*,video/*,audio/*">
                    <button type="button" class="icon-btn" onclick="document.getElementById('dm-file').click()"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/></svg></button>
                    <button type="button" class="icon-btn" id="btn-mic-dm" onclick="toggleRecord('dm')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg></button>
                    <input id="dm-msg" class="chat-msg" placeholder="Mensagem" data-i18n="msg_placeholder" oninput="onDmInputTyping()" autocomplete="off">
                    <button type="button" class="icon-btn" onclick="openEmoji('dm-msg')"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" y1="9" x2="9.01" y2="9"/><line x1="15" y1="9" x2="15.01" y2="9"/></svg></button>
                    <button type="submit" class="btn-send-msg"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button>
                </form>
            </div>
        </div>
