<script>
// ── switchMainTab: alterna entre Notícias e Portal da Transparência ──
function switchMainTab(tab) {
    document.querySelectorAll('.news-main-tab').forEach(b =>
        b.classList.toggle('active', b.dataset.main === tab));
    const panels = {
        news:         document.getElementById('panel-news'),
        transparency: document.getElementById('panel-transparency'),
        quiz:         document.getElementById('panel-quiz'),
        vip:          document.getElementById('panel-vip'),
    };
    Object.entries(panels).forEach(([key, el]) => {
        if (!el) return;
        if (key === tab) {
            el.style.display = 'flex';
        } else {
            el.style.display = 'none';
        }
    });
    if (tab === 'news')         { if (typeof initNews         === 'function') initNews(); }
    if (tab === 'transparency') { if (typeof initTransparency === 'function') initTransparency(); }
    if (tab === 'quiz')         { if (typeof loadQuizPanel    === 'function') loadQuizPanel(); }
    if (tab === 'vip')          { if (typeof loadVipPanel     === 'function') loadVipPanel(); }
}

// ── goView unificado: garante que news e transparency iniciam ao abrir a view ──
document.addEventListener('DOMContentLoaded', () => {
    const _orig = window.goView;
    if (typeof _orig === 'function') {
        window.goView = function(v, btn) {
            _orig(v, btn);
            if (v === 'news') {
                const activeTab = document.querySelector('.news-main-tab.active');
                const main = activeTab?.dataset?.main || 'news';
                if (main === 'transparency') {
                    if (typeof initTransparency === 'function') initTransparency();
                } else {
                    if (typeof initNews === 'function') initNews();
                }
                if (main === 'quiz') { if (typeof loadQuizPanel === 'function') loadQuizPanel(); }
                if (main === 'vip')  { if (typeof loadVipPanel  === 'function') loadVipPanel(); }
            }
        };
    }
});
</script>
